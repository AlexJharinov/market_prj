{% extends "blog_store/base.html" %}

{% block title %}Список блогов{% endblock %}

{% block content %}
<h1>Блог</h1>
<div class="row mb-2">
    {% for blog in blogs %}
      <div class="col-md-6">
        <div class="row g-0 border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative">
          <div class="col p-4 d-flex flex-column position-static">
            <img src="{{ blog.preview.url }}" alt="{{ blog.title }}">

            <strong class="d-inline-block mb-2 text-primary">{{ blog.title }}</strong>
<!--            <h3 class="mb-0">{{ blog.title }}</h3>-->
            <div class="mb-1 text-muted">{{ blog.pub_date }}</div>
            <p class="card-text mb-auto">{{ blog.content|truncatechars:150 }}</p>
            <a href="{% url 'blog_store:blog_detail' blog.pk %}" class="stretched-link">Читать блог</a>

          </div>
        </div>
      </div>
    {% empty %}
    <p>Нет записей в блоге.</p>
    {% endfor %}
</div>
{% endblock %}
