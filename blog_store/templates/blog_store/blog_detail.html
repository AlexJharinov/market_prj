
{% url 'blog_store:blog_detail' blog.pk %}

{% block content %}
  <div class="container mt-4">
    <h1>{{ blog.title }}</h1>
    <p class="text-muted">{{ blog.pub_date }}</p>
    <p>{{ blog.content }}</p>
    <div>
        <h3>{{ blog.title }}</h3>
        <a href="{% url 'blog_store:blog_edit' blog.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
    </div>
    <a href="{% url 'blog_store:blog_list' %}" class="btn btn-secondary">Назад к блогу</a>
  </div>
{% endblock %}
