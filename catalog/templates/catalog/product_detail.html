{% extends 'catalog/base.html'  %}
{% load my_tags %}
{% block content %}
<div class="album py-5 bg-body-tertiary">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col">
                    <div class="card shadow-sm">
                        <img src= " {{ product.image.url}} " class="card-img-top object-fit-cover" style="height: 300px; width: 50%;">
                        <div class="card-body"><p style="max-height: 250px; overflow-y: auto;"</p>
                            <p class="card-text">Название: {{object.name_product}}</p>
                            <p class="card-text">Описание: {{object.desc}}</p>
                            <p class="card-text">Категория: {{object.category}}</p>
                            <p class="card-text">Цена: {{object.p_price}}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="btn-group">

                                </div>
                                <small class="text-body-secondary"></small></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</div>
{% endblock %}
