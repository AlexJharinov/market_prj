{% extends 'catalog/base.html' %}

{% block content %}
<div class="container">
    <h2>Добавить новый товар</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Сохранить</button>
    </form>
</div>
{% endblock %}
